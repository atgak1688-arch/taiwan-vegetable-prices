name: Fetch Vegetable Prices

on:
  schedule:
    # Run daily at 06:00 UTC (14:00 Taiwan time, after morning market closes)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch today's vegetable prices
        run: |
          # ROC date calculation
          YEAR=$(date -u +%Y -d '+8 hours')
          ROC_YEAR=$((YEAR - 1911))
          TODAY=$(date -u +'%m.%d' -d '+8 hours')
          ROC_DATE="${ROC_YEAR}.${TODAY}"

          echo "Fetching data for ROC date: ${ROC_DATE}"

          # Fetch today's vegetable data
          curl -s "https://data.moa.gov.tw/api/v1/AgriProductsTransType/?Start_time=${ROC_DATE}&End_time=${ROC_DATE}&TcType=N04" \
            -o data/today.json

          # Fetch last 30 days for history
          START_DATE=$(date -u +'%Y-%m-%d' -d '+8 hours -30 days')
          START_YEAR=$(date -d "${START_DATE}" +%Y)
          START_ROC=$((START_YEAR - 1911))
          START_MD=$(date -d "${START_DATE}" +'%m.%d')
          ROC_START="${START_ROC}.${START_MD}"

          echo "Fetching history from ${ROC_START} to ${ROC_DATE}"

          curl -s "https://data.moa.gov.tw/api/v1/AgriProductsTransType/?Start_time=${ROC_START}&End_time=${ROC_DATE}&TcType=N04" \
            -o data/history.json

          # Log data sizes
          echo "today.json: $(wc -c < data/today.json) bytes"
          echo "history.json: $(wc -c < data/history.json) bytes"

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes"
          else
            git commit -m "data: update vegetable prices $(date -u +'%Y-%m-%d')"
            git push
          fi
