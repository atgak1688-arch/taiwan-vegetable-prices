name: Fetch Vegetable Prices

on:
  schedule:
    # Run daily at 06:00 UTC (14:00 Taiwan time, after morning market closes)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch today's vegetable prices (all 17 markets)
        run: |
          # ROC date calculation
          YEAR=$(date -u +%Y -d '+8 hours')
          ROC_YEAR=$((YEAR - 1911))
          TODAY=$(date -u +'%m.%d' -d '+8 hours')
          ROC_DATE="${ROC_YEAR}.${TODAY}"

          echo "Fetching data for ROC date: ${ROC_DATE}"

          # All 17 market codes
          MARKETS="109 104 220 241 260 338 400 420 512 514 540 648 800 830 900 930 950"

          # Fetch each market and merge into one JSON
          echo '{"RS":"OK","Data":[' > public/data/today_tmp.json
          FIRST=true
          for CODE in $MARKETS; do
            echo "Fetching market ${CODE}..."
            RESULT=$(curl -s "https://data.moa.gov.tw/api/v1/AgriProductsTransType/?Start_time=${ROC_DATE}&End_time=${ROC_DATE}&TcType=N04&MarketCode=${CODE}" 2>/dev/null)
            ITEMS=$(echo "$RESULT" | python3 -c "
          import json, sys
          try:
            data = json.load(sys.stdin)
            items = [i for i in data.get('Data', []) if i.get('CropName') != '休市']
            for item in items:
              print(json.dumps(item, ensure_ascii=False))
          except: pass
          " 2>/dev/null)
            while IFS= read -r line; do
              if [ -n "$line" ]; then
                if [ "$FIRST" = true ]; then
                  FIRST=false
                else
                  echo ',' >> public/data/today_tmp.json
                fi
                echo "$line" >> public/data/today_tmp.json
              fi
            done <<< "$ITEMS"
          done
          echo '],"Next":false}' >> public/data/today_tmp.json

          # Validate and move
          if python3 -c "import json; json.load(open('public/data/today_tmp.json'))" 2>/dev/null; then
            mv public/data/today_tmp.json public/data/today.json
            echo "today.json: $(wc -c < public/data/today.json) bytes"
          else
            echo "Failed to create valid JSON, keeping old file"
            rm -f public/data/today_tmp.json
          fi

          # Fetch last 30 days history (single request, for chart)
          START_DATE=$(date -u +'%Y-%m-%d' -d '+8 hours -30 days')
          START_YEAR=$(date -d "${START_DATE}" +%Y)
          START_ROC=$((START_YEAR - 1911))
          START_MD=$(date -d "${START_DATE}" +'%m.%d')
          ROC_START="${START_ROC}.${START_MD}"

          echo "Fetching history from ${ROC_START} to ${ROC_DATE}"
          curl -s "https://data.moa.gov.tw/api/v1/AgriProductsTransType/?Start_time=${ROC_START}&End_time=${ROC_DATE}&TcType=N04" \
            -o public/data/history.json

          echo "history.json: $(wc -c < public/data/history.json) bytes"

          # === Fetch fruit data (TcType=N05) ===
          echo "Fetching fruit data..."
          echo '{"RS":"OK","Data":[' > public/data/fruit_tmp.json
          FIRST=true
          for CODE in $MARKETS; do
            echo "Fetching fruit market ${CODE}..."
            RESULT=$(curl -s "https://data.moa.gov.tw/api/v1/AgriProductsTransType/?Start_time=${ROC_DATE}&End_time=${ROC_DATE}&TcType=N05&MarketCode=${CODE}" 2>/dev/null)
            ITEMS=$(echo "$RESULT" | python3 -c "
          import json, sys
          try:
            data = json.load(sys.stdin)
            items = [i for i in data.get('Data', []) if i.get('CropName') != '休市']
            for item in items:
              print(json.dumps(item, ensure_ascii=False))
          except: pass
          " 2>/dev/null)
            while IFS= read -r line; do
              if [ -n "$line" ]; then
                if [ "$FIRST" = true ]; then
                  FIRST=false
                else
                  echo ',' >> public/data/fruit_tmp.json
                fi
                echo "$line" >> public/data/fruit_tmp.json
              fi
            done <<< "$ITEMS"
          done
          echo '],"Next":false}' >> public/data/fruit_tmp.json

          if python3 -c "import json; json.load(open('public/data/fruit_tmp.json'))" 2>/dev/null; then
            mv public/data/fruit_tmp.json public/data/today_fruit.json
            echo "today_fruit.json: $(wc -c < public/data/today_fruit.json) bytes"
          else
            echo "Failed to create valid fruit JSON"
            rm -f public/data/fruit_tmp.json
          fi

      - name: Fetch today's fishery prices
        run: |
          YEAR=$(date -u +%Y -d '+8 hours')
          ROC_YEAR=$((YEAR - 1911))
          TODAY=$(date -u +'%m%d' -d '+8 hours')
          ROC_DATE="${ROC_YEAR}${TODAY}"

          echo "Fetching fish data for ROC date: ${ROC_DATE}"

          curl -s "https://data.moa.gov.tw/Service/OpenData/FromM/AquaticTransData.aspx?StartDate=${ROC_DATE}&EndDate=${ROC_DATE}" \
            -o public/data/fish_raw.json

          python3 -c "
          import json
          with open('public/data/fish_raw.json') as f:
            raw = json.load(f)
          records = []
          for r in raw:
            d = r['交易日期']
            y = d[:-4]
            m = d[-4:-2]
            day = d[-2:]
            records.append({
              'CropName': r['魚貨名稱'],
              'MarketName': r['市場名稱'],
              'TransDate': f'{y}.{m}.{day}',
              'Avg_Price': r['平均價'],
              'Upper_Price': r['上價'],
              'Lower_Price': r['下價'],
              'Trans_Quantity': r['交易量'],
            })
          with open('public/data/today_fish.json', 'w') as f:
            json.dump({'RS': 'OK', 'Data': records}, f, ensure_ascii=False)
          print(f'today_fish.json: {len(records)} records')
          "

          rm -f public/data/fish_raw.json

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          if git diff --staged --quiet; then
            echo "No data changes"
          else
            git commit -m "data: update vegetable prices $(date -u +'%Y-%m-%d')"
            git push
          fi
