<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>台灣蔬菜即時價格查詢</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
  <header>
    <button id="themeToggle" class="theme-toggle" aria-label="切換深淺模式" title="切換深淺模式">Dark</button>
    <h1>台灣蔬菜即時價格查詢</h1>
    <p class="subtitle">資料來源：農業部農糧署 批發市場交易行情</p>
  </header>

  <main>
    <!-- Search -->
    <section class="search-section">
      <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="輸入蔬菜名稱，例如：高麗菜、空心菜..." autocomplete="off">
        <ul id="searchSuggestions" class="suggestions hidden"></ul>
      </div>
      <div class="filters">
        <select id="marketSelect">
          <option value="">全部市場</option>
        </select>
        <select id="dateRange">
          <option value="7">近 7 天</option>
          <option value="30">近 30 天</option>
        </select>
      </div>
    </section>

    <!-- Category tags -->
    <section class="category-section">
      <div class="category-tags" id="categoryTags">
        <button class="tag active" data-category="all">全部</button>
        <button class="tag" data-category="leafy">葉菜類</button>
        <button class="tag" data-category="root">根莖類</button>
        <button class="tag" data-category="gourd">瓜果類</button>
        <button class="tag" data-category="bean">豆類</button>
        <button class="tag" data-category="mushroom">菇類</button>
        <button class="tag" data-category="other">其他</button>
      </div>
    </section>

    <!-- Summary -->
    <section id="summary" class="summary hidden">
      <div class="summary-header">
        <h2 id="summaryTitle"></h2>
        <span id="updateTime" class="update-time"></span>
      </div>
      <div class="summary-cards">
        <div class="card">
          <span class="card-label">平均價</span>
          <span class="card-value" id="avgPrice">-</span>
          <span class="card-unit">元/公斤</span>
        </div>
        <div class="card">
          <span class="card-label">上價</span>
          <span class="card-value" id="upperPrice">-</span>
          <span class="card-unit">元/公斤</span>
        </div>
        <div class="card">
          <span class="card-label">下價</span>
          <span class="card-value" id="lowerPrice">-</span>
          <span class="card-unit">元/公斤</span>
        </div>
        <div class="card">
          <span class="card-label">交易量</span>
          <span class="card-value" id="transQty">-</span>
          <span class="card-unit">公斤</span>
        </div>
      </div>
    </section>

    <!-- Chart -->
    <section id="chartSection" class="chart-section hidden">
      <h3>價格趨勢</h3>
      <div class="chart-container">
        <canvas id="priceChart"></canvas>
      </div>
    </section>

    <!-- Table -->
    <section id="tableSection" class="table-section">
      <div class="table-header">
        <h3 id="tableTitle">今日蔬菜價格一覽</h3>
        <span id="resultCount" class="result-count"></span>
      </div>
      <div class="table-wrapper">
        <table id="priceTable">
          <thead>
            <tr>
              <th data-sort="CropName">品名 &#x25B2;&#x25BC;</th>
              <th data-sort="MarketName" class="hide-mobile">市場 &#x25B2;&#x25BC;</th>
              <th data-sort="Avg_Price">平均價 &#x25B2;&#x25BC;</th>
              <th data-sort="Upper_Price" class="hide-mobile">上價</th>
              <th data-sort="Lower_Price" class="hide-mobile">下價</th>
              <th data-sort="Trans_Quantity">交易量</th>
            </tr>
          </thead>
          <tbody id="priceTableBody">
          </tbody>
        </table>
      </div>
      <div id="loading" class="loading">載入中...</div>
      <div id="noData" class="no-data hidden">查無資料</div>
    </section>
  </main>

  <footer>
    <p>資料來源：<a href="https://data.moa.gov.tw/" target="_blank" rel="noopener">農業部開放資料平台</a> |
       本站僅供參考，實際價格以市場公告為準</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
