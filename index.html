<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>台灣蔬菜即時價格查詢</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
  <header>
    <h1>台灣蔬菜即時價格查詢</h1>
    <p class="subtitle">資料來源：農業部農糧署 批發市場交易行情</p>
  </header>

  <main>
    <section class="controls">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜尋蔬菜名稱，例如：高麗菜、空心菜..." autocomplete="off">
        <button id="searchBtn">查詢</button>
      </div>
      <div class="filters">
        <select id="marketSelect">
          <option value="">全部地區</option>
          <option value="北部">北部</option>
          <option value="中部">中部</option>
        </select>
        <select id="dateRange">
          <option value="7">近 7 天</option>
          <option value="30">近 30 天</option>
        </select>
      </div>
    </section>

    <section id="summary" class="summary hidden">
      <div class="summary-header">
        <h2 id="summaryTitle"></h2>
        <span id="updateTime" class="update-time"></span>
      </div>
      <div class="summary-cards">
        <div class="card">
          <span class="card-label">平均價</span>
          <span class="card-value" id="avgPrice">-</span>
          <span class="card-unit">元/公斤</span>
        </div>
        <div class="card">
          <span class="card-label">交易量</span>
          <span class="card-value" id="transQty">-</span>
          <span class="card-unit">公斤</span>
        </div>
      </div>
    </section>

    <section id="chartSection" class="chart-section hidden">
      <h3>價格趨勢</h3>
      <div class="chart-container">
        <canvas id="priceChart"></canvas>
      </div>
    </section>

    <section id="tableSection" class="table-section">
      <h3 id="tableTitle">今日蔬菜價格一覽</h3>
      <div class="table-wrapper">
        <table id="priceTable">
          <thead>
            <tr>
              <th data-sort="CropName">品名 &#x25B2;&#x25BC;</th>
              <th data-sort="Avg_Price">平均價(元/公斤) &#x25B2;&#x25BC;</th>
              <th data-sort="Trans_Quantity">交易量(公斤) &#x25B2;&#x25BC;</th>
            </tr>
          </thead>
          <tbody id="priceTableBody">
          </tbody>
        </table>
      </div>
      <div id="loading" class="loading">載入中...</div>
      <div id="noData" class="no-data hidden">查無資料</div>
    </section>
  </main>

  <footer>
    <p>資料來源：<a href="https://data.moa.gov.tw/" target="_blank" rel="noopener">農業部開放資料平台</a> |
       本站僅供參考，實際價格以市場公告為準</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
