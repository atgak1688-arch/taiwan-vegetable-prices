<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>台灣蔬果即時價格查詢</title>
  <!-- Styles are imported via TypeScript modules -->
</head>
<body>
  <header>
    <label class="theme-switch" title="切換深淺模式">
      <input type="checkbox" id="themeToggle">
      <span class="switch-track">
        <span class="switch-icon sun"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg></span>
        <span class="switch-icon moon"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span>
        <span class="switch-thumb"></span>
      </span>
    </label>
    <!-- Falling produce animation -->
    <div class="falling-produce" id="fallingProduce" aria-hidden="true">
      <span class="fall-item" style="--x: 12%; --delay: 0s;">🥬</span>
      <span class="fall-item" style="--x: 35%; --delay: 0.15s;">🥕</span>
      <span class="fall-item" style="--x: 55%; --delay: 0.08s;">🌽</span>
      <span class="fall-item" style="--x: 75%; --delay: 0.22s;">🍅</span>
      <span class="fall-item" style="--x: 90%; --delay: 0.12s;">🥦</span>
    </div>
    <h1 class="anim-fade-in" style="--fade-delay: 0.55s;">台灣蔬果即時價格查詢</h1>
    <p class="subtitle anim-fade-in" style="--fade-delay: 0.7s;">資料來源：農業部農糧署 批發市場交易行情</p>
  </header>

  <main>
    <!-- Type toggle -->
    <section class="type-toggle-section anim-fade-in" style="--fade-delay: 0.8s;">
      <div class="type-toggle" id="typeToggle">
        <button class="type-btn active" data-type="veg">蔬菜</button>
        <button class="type-btn" data-type="fruit">水果</button>
        <button class="type-btn" data-type="fish">漁產</button>
      </div>
    </section>

    <!-- Search -->
    <section class="search-section anim-fade-in" style="--fade-delay: 0.9s;">
      <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="輸入蔬菜名稱，例如：高麗菜、空心菜..." autocomplete="off">
        <button id="clearSearch" class="clear-btn hidden" aria-label="清除搜尋">&times;</button>
        <ul id="searchSuggestions" class="suggestions hidden"></ul>
      </div>
    </section>

    <!-- Region tags -->
    <section class="filter-section anim-fade-in" style="--fade-delay: 1.0s;">
      <div class="filter-group">
        <span class="filter-label">地區</span>
        <div class="filter-tags" id="regionTags">
          <button class="tag active" data-region="all">全部地區</button>
          <button class="tag" data-region="north">北部</button>
          <button class="tag" data-region="central">中部</button>
          <button class="tag" data-region="south">南部</button>
          <button class="tag" data-region="east">東部</button>
        </div>
      </div>
      <div class="filter-group">
        <span class="filter-label">單位</span>
        <div class="filter-tags" id="unitTags">
          <button class="tag active" data-unit="kg">公斤</button>
          <button class="tag" data-unit="catty">台斤</button>
          <button class="tag" data-unit="100g">100克</button>
        </div>
      </div>
      <div class="filter-group">
        <span class="filter-label">產季</span>
        <div class="filter-tags" id="seasonTags">
          <button class="tag active" data-season="all">全部</button>
          <button class="tag" data-season="in-season">當季</button>
          <button class="tag" data-season="off-season">非當季</button>
        </div>
      </div>
      <div class="filter-group">
        <span class="filter-label">分類</span>
        <div class="filter-tags" id="categoryTags">
          <button class="tag active" data-category="all">全部</button>
          <button class="tag" data-category="leafy">青菜</button>
          <button class="tag" data-category="gourd">瓜類</button>
          <button class="tag" data-category="root">根莖筍</button>
          <button class="tag" data-category="spice">蔥薑蒜</button>
          <button class="tag" data-category="fruit">瓜果茄</button>
          <button class="tag" data-category="mushroom">菇類</button>
          <button class="tag" data-category="bean">豆類</button>
          <button class="tag" data-category="other">其他</button>
        </div>
      </div>
    </section>

    <!-- Data info -->
    <div id="dataInfo" class="data-info hidden"></div>

    <!-- Table -->
    <section id="tableSection" class="table-section anim-fade-in" style="--fade-delay: 1.1s;">
      <div class="table-header">
        <h3 id="tableTitle">今日蔬菜價格一覽</h3>
        <span id="resultCount" class="result-count"></span>
      </div>
      <div class="table-wrapper">
        <table id="priceTable">
          <thead>
            <tr>
              <th data-sort="CropName">品名 &#x25B2;&#x25BC;</th>
              <th data-sort="Avg_Price">平均價 &#x25B2;&#x25BC;</th>
              <th data-sort="Upper_Price">上價 &#x25B2;&#x25BC;</th>
              <th data-sort="Lower_Price">下價 &#x25B2;&#x25BC;</th>
              <th data-sort="Trans_Quantity">交易量 &#x25B2;&#x25BC;</th>
            </tr>
          </thead>
          <tbody id="priceTableBody">
          </tbody>
        </table>
      </div>
      <div id="loading" class="loading">載入中...</div>
      <div id="noData" class="no-data hidden">查無資料</div>
      <div id="pagination" class="pagination hidden"></div>
    </section>
  </main>

  <footer>
    <p>資料來源：<a href="https://data.moa.gov.tw/" target="_blank" rel="noopener">農業部開放資料平台</a> |
       本站僅供參考，實際價格以市場公告為準</p>
  </footer>

  <script type="module" src="/src/app.ts"></script>
  <script type="module" src="/src/chatbot.ts"></script>
</body>
</html>
