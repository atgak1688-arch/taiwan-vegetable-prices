<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>蔬菜價格詳情 - 台灣蔬菜即時價格查詢</title>
  <link rel="stylesheet" href="css/style.css?v=7">
  <link rel="stylesheet" href="css/detail.css?v=7">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
  <header>
    <label class="theme-switch" title="切換深淺模式">
      <input type="checkbox" id="themeToggle">
      <span class="switch-track">
        <span class="switch-icon sun"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg></span>
        <span class="switch-icon moon"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span>
        <span class="switch-thumb"></span>
      </span>
    </label>
    <h1 id="cropTitle">載入中...</h1>
    <p class="subtitle"><a href="index.html" class="back-link">< 返回價格總覽</a></p>
  </header>

  <main>
    <!-- Summary cards -->
    <section class="detail-summary">
      <div class="detail-date" id="detailDate"></div>
      <div class="summary-cards">
        <div class="card card-primary">
          <span class="card-label">平均價</span>
          <span class="card-value" id="avgPrice">-</span>
          <span class="card-unit">元/公斤</span>
        </div>
        <div class="card">
          <span class="card-label">上價</span>
          <span class="card-value" id="upperPrice">-</span>
          <span class="card-unit">元/公斤</span>
        </div>
        <div class="card">
          <span class="card-label">下價</span>
          <span class="card-value" id="lowerPrice">-</span>
          <span class="card-unit">元/公斤</span>
        </div>
        <div class="card">
          <span class="card-label">總交易量</span>
          <span class="card-value" id="transQty">-</span>
          <span class="card-unit">公斤</span>
        </div>
      </div>
    </section>

    <!-- Chart -->
    <section class="detail-chart">
      <div class="chart-header">
        <h2>價格趨勢</h2>
        <div class="chart-controls">
          <button class="range-btn active" data-days="7">近 7 天</button>
          <button class="range-btn" data-days="30">近 30 天</button>
        </div>
      </div>
      <div class="chart-container">
        <canvas id="priceChart"></canvas>
      </div>
    </section>

    <!-- Market comparison -->
    <section class="detail-markets">
      <h2>各市場價格比較</h2>
      <div class="market-cards" id="marketCards"></div>
    </section>

    <div id="loading" class="loading">載入中...</div>
    <div id="noData" class="no-data hidden">查無此蔬菜資料</div>
  </main>

  <footer>
    <p>資料來源：<a href="https://data.moa.gov.tw/" target="_blank" rel="noopener">農業部開放資料平台</a> |
       本站僅供參考，實際價格以市場公告為準</p>
  </footer>

  <script src="js/detail.js?v=7"></script>
</body>
</html>
